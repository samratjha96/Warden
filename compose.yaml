services:
  server:
    build:
      context: .
    command: ["server"]
    user: "${UID:-1000}:${GID:-1000}"
    init: true
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file:
      - path: .env
        required: false
    environment:
      PORT: "12000"
      MAX_ACTIVE_JOBS: "0"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:12000/api/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    ports:
      - "12000:12000"
    tmpfs:
      - /tmp:uid=${UID:-1000},gid=${GID:-1000}
    volumes:
      - ./site/data:/app/site/data

  worker:
    build:
      context: .
    command: ["worker"]
    user: "${UID:-1000}:${GID:-1000}"
    init: true
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file:
      - path: .env
        required: false
    tmpfs:
      - /tmp:uid=${UID:-1000},gid=${GID:-1000}
    volumes:
      - ./site/data:/app/site/data

  trending:
    build:
      context: .
    command: ["trending"]
    user: "${UID:-1000}:${GID:-1000}"
    init: true
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file:
      - path: .env
        required: false
    environment:
      TRENDING_MAX_REPOS: "${TRENDING_MAX_REPOS:-10}"
      TRENDING_DEDUPE_DAYS: "${TRENDING_DEDUPE_DAYS:-30}"
    tmpfs:
      - /tmp:uid=${UID:-1000},gid=${GID:-1000}
    volumes:
      - ./site/data:/app/site/data
