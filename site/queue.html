<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Queue | OSS Watchdog</title>
    <link rel="stylesheet" href="css/brutal.css">
</head>
<body>

    <header class="masthead">
        <div class="masthead-top">
            <div class="masthead-meta">
                <span>SOP v1.4</span>
                <span id="current-date"></span>
                <span>ZERO-TRUST POSTURE</span>
            </div>
            <nav class="masthead-nav">
                <a href="index.html">Submit</a>
                <a href="queue.html" class="active">Queue</a>
                <a href="reports.html">Reports</a>
            </nav>
        </div>
        <div class="masthead-title">
            <h1>OSS Watchdog</h1>
            <div class="tagline">Adversarial Security Analysis for Open Source</div>
        </div>
    </header>

    <div class="page-wrap">

        <div class="page-header">
            <div class="page-title">Analysis Queue</div>
            <div class="page-count" id="queue-count">Loading...</div>
        </div>

        <div id="new-submission" style="display:none; margin-bottom: 24px;">
            <div class="queue-item" style="border-color: var(--amber);">
                <div class="queue-item-head">
                    <div class="queue-pkg" id="new-pkg"></div>
                    <span class="queue-status processing">PROCESSING</span>
                </div>
                <div class="queue-item-body">
                    <div class="queue-meta" id="new-meta"></div>
                    <div class="queue-progress" style="margin-top:12px;">
                        <div class="queue-progress-bar" style="width:15%; animation: progress-pulse 2s ease-in-out infinite;"></div>
                    </div>
                    <p style="margin-top:8px;font-size:12px;color:var(--mid);font-family:'Space Mono',monospace;">
                        Analysis in progress. You'll be notified when the report is ready.
                    </p>
                </div>
            </div>
        </div>

        <div id="queue-container">
            <div class="loading-skeleton" style="height:200px;"></div>
        </div>

    </div>

    <style>
        @keyframes progress-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('current-date').textContent = new Date().toISOString().split('T')[0];
        
        // Check for new submission from URL params
        var params = new URLSearchParams(window.location.search);
        var submittedUrl = params.get('url');
        
        if (submittedUrl) {
            // Parse the URL to extract owner/repo
            var match = submittedUrl.match(/(?:github|gitlab)\.com\/([^\/]+)\/([^\/\?#]+)/i);
            var owner = match ? match[1] : 'unknown';
            var repo = match ? match[2] : submittedUrl;
            
            document.getElementById('new-submission').style.display = 'block';
            document.getElementById('new-pkg').textContent = owner + ' / ' + repo;
            document.getElementById('new-meta').textContent = 
                'Submitted: ' + new Date().toISOString().split('T')[0] + ' · URL: ' + submittedUrl;
        }
        
        // Load queue
        App.loadQueueIndex().then(function(data) {
            var jobs = data.jobs || [];
            document.getElementById('queue-count').textContent = jobs.length + ' jobs in queue';
            App.renderQueue(jobs, document.getElementById('queue-container'));
        });
    </script>
</body>
</html>
