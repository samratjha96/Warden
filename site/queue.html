<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Queue | OSS Watchdog</title>
    <link rel="stylesheet" href="css/brutal.css">
    <style>
        @keyframes progress-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <header class="masthead">
        <div class="masthead-top">
            <div class="masthead-meta">
                <span>SOP v1.4</span>
                <span id="current-date"></span>
                <span>ZERO-TRUST POSTURE</span>
            </div>
            <nav class="masthead-nav">
                <a href="index.html">Submit</a>
                <a href="queue.html" class="active">Queue</a>
                <a href="reports.html">Reports</a>
            </nav>
        </div>
        <div class="masthead-title">
            <h1>OSS Watchdog</h1>
            <div class="tagline">Adversarial Security Analysis for Open Source</div>
        </div>
    </header>

    <div class="page-wrap">

        <div class="page-header">
            <div class="page-title">Analysis Queue</div>
            <div class="page-count" id="queue-count">Loading...</div>
        </div>

        <div id="queue-container">
            <div class="loading-skeleton" style="height:200px;"></div>
        </div>

    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('current-date').textContent = new Date().toISOString().split('T')[0];
        
        function loadQueue() {
            fetch('data/queue/jobs.json')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var jobs = data.jobs || [];
                    document.getElementById('queue-count').textContent = jobs.length + ' jobs in queue';
                    App.renderQueue(jobs, document.getElementById('queue-container'));
                })
                .catch(function() {
                    document.getElementById('queue-count').textContent = '0 jobs in queue';
                    document.getElementById('queue-container').innerHTML = 
                        '<div class="empty-state"><div class="empty-state-title">Queue Empty</div>' +
                        '<div class="empty-state-desc">No pending analyses</div></div>';
                });
        }
        
        loadQueue();
        // Refresh every 5 seconds
        setInterval(loadQueue, 5000);
    </script>
</body>
</html>
