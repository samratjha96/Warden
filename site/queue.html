<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Queue | Warden</title>
    <meta name="description" content="View pending and active Warden repository analyses.">
    <meta property="og:title" content="Analysis Queue | Warden">
    <meta property="og:description" content="Track pending and active Warden repository analyses.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Analysis Queue | Warden">
    <meta name="twitter:description" content="Track pending and active Warden repository analyses.">
    <link rel="stylesheet" href="css/brutal.css">
    <style>
        @keyframes progress-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <header class="masthead">
        <div class="masthead-top">
            <nav class="masthead-nav">
                <a href="index.html">Submit</a>
                <a href="queue.html" class="active">Queue</a>
                <a href="reports.html">Reports</a>
            </nav>
        </div>
        <div class="masthead-title">
            <a href="index.html" class="masthead-home-link"><h1>Warden</h1></a>
            <div class="tagline">Adversarial Security Review for Open Source Repositories</div>
        </div>
    </header>

    <div class="page-wrap">

        <div class="page-header">
            <div class="page-title">Analysis Queue</div>
            <div class="page-count" id="queue-count">Loading...</div>
        </div>

        <div id="queue-submit-status" class="empty-state" style="display:none;margin-bottom:24px;"></div>

        <div id="queue-container">
            <div class="loading-skeleton" style="height:200px;"></div>
        </div>

    </div>

    <script src="js/app.js"></script>
    <script>
        function setSubmissionStatus(title, message, tone) {
            var el = document.getElementById('queue-submit-status');
            if (!title && !message) {
                el.style.display = 'none';
                el.innerHTML = '';
                return;
            }

            var color = 'var(--ink)';
            if (tone === 'success') color = 'var(--green)';
            if (tone === 'warn') color = 'var(--amber)';
            if (tone === 'error') color = 'var(--red)';

            el.style.display = 'block';
            el.innerHTML =
                '<div class="empty-state-title" style="color:' + color + ';">' + App.escapeHtml(title) + '</div>' +
                '<div class="empty-state-desc">' + App.escapeHtml(message) + '</div>';
        }

        function loadQueue() {
            App.fetchJSONFresh('data/queue/jobs.json')
                .then(function(data) {
                    var jobs = data.jobs || [];
                    document.getElementById('queue-count').textContent = jobs.length + ' jobs in queue';
                    App.renderQueue(jobs, document.getElementById('queue-container'));
                })
                .catch(function() {
                    document.getElementById('queue-count').textContent = '0 jobs in queue';
                    document.getElementById('queue-container').innerHTML =
                        '<div class="empty-state"><div class="empty-state-title">Queue Empty</div>' +
                        '<div class="empty-state-desc">No pending analyses</div></div>';
                });
        }

        function resumePendingSubmission() {
            var raw = sessionStorage.getItem('wardenPendingSubmission');
            if (!raw) {
                return Promise.resolve(false);
            }

            var pending;
            try {
                pending = JSON.parse(raw);
            } catch (err) {
                sessionStorage.removeItem('wardenPendingSubmission');
                setSubmissionStatus('Submit Failed', 'Saved submission data was invalid. Return to Submit and try again.', 'error');
                return Promise.resolve(false);
            }

            setSubmissionStatus('Queueing Analysis', pending.url);

            return App.submitJob(pending.url, pending.options)
                .then(function(data) {
                    sessionStorage.removeItem('wardenPendingSubmission');
                    if (data.job) {
                        setSubmissionStatus(
                            'Analysis Queued',
                            data.job.owner + ' / ' + data.job.repo + ' is now in the queue.',
                            'success'
                        );
                    } else {
                        setSubmissionStatus('Submit Failed', 'Server returned an invalid queue response.', 'error');
                    }
                    return true;
                })
                .catch(function(err) {
                    sessionStorage.removeItem('wardenPendingSubmission');
                    if (err.code === 'duplicate_queue_entry') {
                        setSubmissionStatus('Mission Already Active', err.message, 'warn');
                        return true;
                    }

                    setSubmissionStatus('Submit Failed', err.message, 'error');
                    return false;
                });
        }

        window.removeQueueItem = function(jobId) {
            App.removeQueueJob(jobId)
                .then(function() {
                    loadQueue();
                })
                .catch(function(err) {
                    alert('Remove failed: ' + err.message);
                });
        };

        resumePendingSubmission().finally(function() {
            loadQueue();
            setInterval(loadQueue, 5000);
        });
    </script>
</body>
</html>
