<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Reports | Warden</title>
    <meta name="description" content="Browse completed Warden security reviews for open source repositories.">
    <meta property="og:title" content="All Reports | Warden">
    <meta property="og:description" content="Browse completed Warden security reviews for open source repositories.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="All Reports | Warden">
    <meta name="twitter:description" content="Browse completed Warden security reviews for open source repositories.">
    <link rel="stylesheet" href="css/brutal.css">
</head>
<body>

    <header class="masthead">
        <div class="masthead-top">
            <nav class="masthead-nav">
                <a href="index.html">Submit</a>
                <a href="queue.html">Queue</a>
                <a href="reports.html" class="active">Reports</a>
            </nav>
        </div>
        <div class="masthead-title">
            <a href="index.html" class="masthead-home-link"><h1>Warden</h1></a>
            <div class="tagline">Adversarial Security Review for Open Source Repositories</div>
        </div>
    </header>

    <div class="page-wrap">

        <div class="page-header">
            <div class="page-title">All Analyses</div>
            <div class="page-count" id="result-count">Loading...</div>
        </div>

        <div class="filters">
            <div class="filter-search">
                <input type="text" id="search-input" placeholder="Filter by package name or owner...">
            </div>
            <div class="filter-group">
                <div class="filter-item">
                    <div class="filter-label">Verdict</div>
                    <select id="filter-verdict">
                        <option value="">All</option>
                        <option value="approve">Approve</option>
                        <option value="conditional">Conditions</option>
                        <option value="reject">Reject</option>
                    </select>
                </div>
                <div class="filter-item">
                    <div class="filter-label">Risk</div>
                    <select id="filter-risk">
                        <option value="">All</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
            </div>
        </div>

        <table class="scan-table">
            <colgroup>
                <col style="width:210px">
                <col style="width:110px">
                <col style="width:100px">
                <col style="width:46px">
                <col>
                <col style="width:96px">
                <col style="width:150px">
            </colgroup>
            <thead>
                <tr>
                    <th>Package</th>
                    <th>Ecosystem</th>
                    <th>Analyzed</th>
                    <th>Risk</th>
                    <th>Key Finding</th>
                    <th style="text-align:right">Verdict</th>
                    <th style="text-align:right">Action</th>
                </tr>
            </thead>
            <tbody id="reports-table-body">
                <tr>
                    <td colspan="7" class="loading-skeleton" style="height:200px;"></td>
                </tr>
            </tbody>
        </table>

    </div>

    <script src="js/app.js"></script>
    <script>
        
        var allReports = [];
        
        function filterReports() {
            var search = document.getElementById('search-input').value.toLowerCase();
            var verdict = document.getElementById('filter-verdict').value;
            var risk = document.getElementById('filter-risk').value;
            
            var filtered = allReports.filter(function(r) {
                var matchSearch = !search || 
                    (r.owner + ' ' + r.repo).toLowerCase().indexOf(search) !== -1;
                var matchVerdict = !verdict || r.verdict === verdict;
                var matchRisk = !risk || r.risk === risk;
                return matchSearch && matchVerdict && matchRisk;
            });
            
            App.renderReportsTable(filtered, document.getElementById('reports-table-body'));
            document.getElementById('result-count').textContent = 
                'Showing ' + filtered.length + ' of ' + allReports.length + ' results';
        }

        window.deleteReportItem = function(reportId) {
            if (!reportId) return;
            var ok = window.confirm('Delete this report? This cannot be undone.');
            if (!ok) return;

            App.removeReport(reportId)
                .then(function() {
                    allReports = allReports.filter(function(r) {
                        return r.id !== reportId;
                    });
                    filterReports();
                })
                .catch(function(err) {
                    alert('Failed to delete report: ' + err.message);
                });
        };

        window.regenerateReportItem = function(reportId, owner, repo) {
            App.openRegenerationDialog({
                id: reportId,
                owner: owner,
                repo: repo
            });
        };
        
        // Load all reports
        App.loadReportsIndex().then(function(data) {
            allReports = data.reports || [];
            // Sort by date descending
            allReports.sort(function(a, b) {
                return b.analyzed.localeCompare(a.analyzed);
            });
            filterReports();
        });
        
        // Add filter listeners
        document.getElementById('search-input').addEventListener('input', filterReports);
        document.getElementById('filter-verdict').addEventListener('change', filterReports);
        document.getElementById('filter-risk').addEventListener('change', filterReports);
    </script>
</body>
</html>
