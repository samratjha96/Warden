<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Report | Warden</title>
    <meta name="description" content="Review Warden security analysis reports for open source repositories.">
    <meta property="og:title" content="Security Report | Warden">
    <meta property="og:description" content="Review Warden security analysis reports for open source repositories.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Security Report | Warden">
    <meta name="twitter:description" content="Review Warden security analysis reports for open source repositories.">
    <link rel="stylesheet" href="css/brutal.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Markdown Content Styling */
        .markdown-body {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 17px;
            line-height: 1.75;
            color: var(--ink);
            padding: 28px 0 12px;
            min-width: 0;
            overflow-wrap: anywhere;
        }
        .markdown-body > p:first-of-type {
            margin-bottom: 24px;
            padding: 16px 20px;
            border: 1px solid var(--rule);
            background: #efebe4;
        }
        .markdown-body h1 { display: none; }
        .markdown-body h2 {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--mid);
            border-bottom: 2px solid var(--ink);
            padding-bottom: 8px;
            margin: 48px 0 24px;
        }
        .markdown-body h2 span { color: var(--ink); }
        .markdown-body h2:first-of-type { margin-top: 0; }
        .markdown-body h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 17px;
            font-weight: 700;
            margin: 32px 0 12px;
        }
        .markdown-body p { margin-bottom: 16px; }
        .markdown-body pre {
            background: var(--ink);
            color: var(--paper);
            border: none;
            padding: 16px 20px;
            overflow-x: auto;
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            line-height: 1.5;
            margin: 16px 0;
        }
        .markdown-body pre.evidence-section-item {
            background: #efebe4;
            color: var(--ink);
            border: 1px solid var(--rule);
        }
        .markdown-body code {
            font-family: 'Space Mono', monospace;
            font-size: 0.85em;
            background: #ebe8e2;
            padding: 1px 5px;
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;
        }
        .markdown-body pre code {
            background: none;
            padding: 0;
            color: inherit;
            white-space: pre;
            overflow-wrap: normal;
            word-break: normal;
        }
        .markdown-body pre.evidence-section-item code {
            color: inherit;
        }
        .markdown-body ul, .markdown-body ol {
            margin-bottom: 16px;
            padding-left: 24px;
        }
        .markdown-body li { margin-bottom: 8px; }
        .markdown-body blockquote {
            border-left: 4px solid var(--amber);
            margin: 16px 0;
            padding: 12px 20px;
            background: rgba(184, 92, 0, 0.08);
            font-style: italic;
        }
        .markdown-body strong { font-weight: 700; }
        .markdown-body a { color: var(--ink); text-decoration: underline; }
        .markdown-body hr {
            border: none;
            border-top: 1px solid var(--ink);
            margin: 32px 0;
        }
        /* Markdown tables */
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            display: block;
            overflow-x: auto;
        }
        .markdown-body table thead tr {
            background: var(--ink);
            color: var(--paper);
        }
        .markdown-body table th {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 10px 16px;
            text-align: left;
            white-space: nowrap;
            overflow-wrap: normal;
            word-break: normal;
        }
        .markdown-body table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--rule);
            vertical-align: top;
            font-size: 15px;
            line-height: 1.6;
            overflow-wrap: normal;
            word-break: normal;
        }
        .markdown-body table tr:last-child td { border-bottom: none; }
        .markdown-body table tbody tr:hover td { background: rgba(0,0,0,0.02); }
    </style>
</head>
<body>

    <header class="masthead">
        <div class="masthead-top">
            <nav class="masthead-nav">
                <a href="index.html">Submit</a>
                <a href="queue.html">Queue</a>
                <a href="reports.html">Reports</a>
            </nav>
        </div>
        <div class="masthead-title">
            <a href="index.html" class="masthead-home-link"><h1>Warden</h1></a>
            <div class="tagline">Adversarial Security Review for Open Source Repositories</div>
        </div>
    </header>

    <div class="breadcrumb-bar">
        <a href="reports.html">Reports</a> /
        <span id="breadcrumb-pkg">Loading...</span>
    </div>

    <div id="report-container">
        <div class="page-wrap">
            <div class="loading-skeleton" style="height:400px;margin-top:40px;"></div>
        </div>
    </div>

    <script src="js/app.js?v=2"></script>
    <script>
        marked.setOptions({ breaks: true, gfm: true });
        
        var reportId = App.getParam('id');
        
        if (!reportId) {
            document.getElementById('report-container').innerHTML = 
                '<div class="page-wrap"><div class="error-banner">No report ID specified</div></div>';
            document.getElementById('breadcrumb-pkg').textContent = 'Error';
        } else {
            App.loadReport(reportId)
                .then(function(report) {
                    var reportTitle = report.owner + '/' + report.repo + ' — Security Report | Warden';
                    var reportDescription = 'Warden security review for ' + report.owner + '/' + report.repo + '.';
                    document.title = reportTitle;
                    var metaDescription = document.querySelector('meta[name="description"]');
                    var ogTitle = document.querySelector('meta[property="og:title"]');
                    var ogDescription = document.querySelector('meta[property="og:description"]');
                    var twitterTitle = document.querySelector('meta[name="twitter:title"]');
                    var twitterDescription = document.querySelector('meta[name="twitter:description"]');
                    if (metaDescription) metaDescription.setAttribute('content', reportDescription);
                    if (ogTitle) ogTitle.setAttribute('content', reportTitle);
                    if (ogDescription) ogDescription.setAttribute('content', reportDescription);
                    if (twitterTitle) twitterTitle.setAttribute('content', reportTitle);
                    if (twitterDescription) twitterDescription.setAttribute('content', reportDescription);
                    document.getElementById('breadcrumb-pkg').textContent = report.owner + ' / ' + report.repo;
                    
                    if (report.format === 'markdown' && report.content) {
                        renderMarkdownReport(report);
                    } else {
                        App.renderReport(report, document.getElementById('report-container'));
                    }
                })
                .catch(function(err) {
                    document.getElementById('report-container').innerHTML = 
                        '<div class="page-wrap"><div class="error-banner">Report not found: ' + App.escapeHtml(reportId) + '</div></div>';
                    document.getElementById('breadcrumb-pkg').textContent = 'Not Found';
                });
        }

        window.deleteCurrentReport = function(currentReportId) {
            if (!currentReportId) return;
            var ok = window.confirm('Delete this report? This cannot be undone.');
            if (!ok) return;

            App.removeReport(currentReportId)
                .then(function() {
                    window.location.href = 'reports.html';
                })
                .catch(function(err) {
                    alert('Failed to delete report: ' + err.message);
                });
        };

        window.regenerateReportItem = function(reportId, owner, repo) {
            App.openRegenerationDialog({
                id: reportId,
                owner: owner,
                repo: repo
            });
        };
        
        function renderMarkdownReport(report) {
            var container = document.getElementById('report-container');
            var stats = report.stats || {};
            var verdictClass = report.risk === 'high' ? 'risk-high' : 
                              report.risk === 'medium' ? 'risk-med' : 'risk-low';
            var verdictText = report.verdict === 'reject' ? 'REJECT' :
                             report.verdict === 'approve' ? 'APPROVE' : 'CONDITIONAL';
            
            // Strip metadata section from markdown before rendering
            var content = report.content.replace(/---\s*\n+##\s*Metadata[\s\S]*$/, '');
            
            var html = '';
            var repoLabel = App.escapeHtml(report.owner + ' / ' + report.repo);
            var repoLinkHtml = report.url
                ? '<a href="' + App.escapeHtml(report.url) + '" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:underline;">' + repoLabel + '</a>'
                : repoLabel;
            
            // Verdict Banner (same as App.renderReport)
            html += '<div class="verdict-banner">' +
                '<div>' +
                    '<div class="verdict-pkg">' + repoLinkHtml + '</div>' +
                    '<div class="verdict-meta">' +
                        '<strong>commit</strong> ' + App.escapeHtml(report.commit || 'unknown') + ' &nbsp;·&nbsp;' +
                        '<strong>analyzed</strong> ' + App.escapeHtml(report.analyzed || 'unknown') + ' &nbsp;·&nbsp;' +
                        '<strong>ecosystem</strong> ' + App.escapeHtml(report.ecosystem || 'unknown') +
                    '</div>' +
                '</div>' +
                '<div class="verdict-risk-col">' +
                    '<div class="verdict-risk-label">Verdict</div>' +
                    '<div class="verdict-risk-val ' + verdictClass + '">' + verdictText + '</div>' +
                    '<div style="font-family:\'Space Mono\',monospace;font-size:10px;color:#666;margin-top:4px;">Risk: ' + (report.risk || 'medium').toUpperCase() + '</div>' +
                '</div>' +
            '</div>';
            
            // Body grid layout (same structure as App.renderReport)
            html += '<div class="body-grid">';
            
            // Main column with markdown content
            html += '<div class="main-col">';
            html += App.renderApprovalConditionsCallout(report);
            html += '<div class="markdown-body">';
            html += marked.parse(content);
            html += '</div>';
            html += '</div>';
            
            // Sidebar column
            html += '<div class="side-col">';
            
            // Community Trust block
            html += '<div class="side-block">' +
                '<div class="side-head">Community Trust</div>' +
                '<div class="stat-trio">' +
                    '<div class="stat-trio-item"><div class="stat-num">' + App.escapeHtml(stats.stars || '—') + '</div><div class="stat-lbl">Stars</div></div>' +
                    '<div class="stat-trio-item"><div class="stat-num">' + App.escapeHtml(stats.forks || '—') + '</div><div class="stat-lbl">Forks</div></div>' +
                    '<div class="stat-trio-item"><div class="stat-num">' + App.escapeHtml(stats.contributors || '—') + '</div><div class="stat-lbl">Contribs</div></div>' +
                '</div>' +
                '<div class="side-body">' +
                    '<div class="side-row"><span class="side-key">SECURITY.md</span><span class="side-val" style="color:' + (stats.hasSecurityMd ? 'var(--green)' : 'var(--red)') + ';">' + (stats.hasSecurityMd ? 'Present ✓' : 'Missing ✕') + '</span></div>' +
                    '<div class="side-row"><span class="side-key">Open issues</span><span class="side-val">' + (stats.openIssues || 0) + '</span></div>' +
                    '<div class="side-row"><span class="side-key">Created</span><span class="side-val">' + App.escapeHtml(stats.created || '—') + '</span></div>' +
                    '<div class="side-row"><span class="side-key">License</span><span class="side-val">' + App.escapeHtml(stats.license || '—') + '</span></div>' +
                '</div>' +
            '</div>';
            
            // Verdict block
            var verdictBadgeClass = report.verdict === 'reject' ? 'rf-fail' :
                                   report.verdict === 'approve' ? 'rf-pass' : 'rf-caution';
            html += '<div class="side-block">' +
                '<div class="side-head">Analysis Verdict</div>' +
                '<div class="side-body" style="text-align:center;padding:20px 14px;">' +
                    '<span class="rf-badge ' + verdictBadgeClass + '" style="font-size:14px;padding:8px 16px;">' + verdictText + '</span>' +
                    '<div style="margin-top:12px;font-family:\'Space Mono\',monospace;font-size:11px;color:var(--mid);">Risk Level: ' + (report.risk || 'medium').toUpperCase() + '</div>' +
                '</div>' +
            '</div>';
            
            // Key Finding block
            if (report.keyFinding) {
                html += '<div class="side-block">' +
                    '<div class="side-head">Key Finding</div>' +
                    '<div class="side-body" style="font-size:13px;line-height:1.6;">' +
                        App.escapeHtml(report.keyFinding) +
                    '</div>' +
                '</div>';
            }

            html += App.renderReportDeleteBlock(report);
            
            html += '</div>'; // side-col
            html += '</div>'; // body-grid
            
            container.innerHTML = html;
            App.enhanceMarkdownEvidenceFormatting(container);
        }
    </script>
</body>
</html>
